name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install build
      - run: python -m build
      - run: python -m venv /tmp/promptdeck-wheel
      - run: /tmp/promptdeck-wheel/bin/pip install --find-links dist promptdeck-qt
      - run: /tmp/promptdeck-wheel/bin/promptdeck --help

  installer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - if: runner.os == 'Linux'
        run: |
          PROMPTDECK_PACKAGE=. \
          XDG_CONFIG_HOME="$RUNNER_TEMP/config" \
          XDG_DATA_HOME="$RUNNER_TEMP/data" \
          XDG_BIN_HOME="$RUNNER_TEMP/bin" \
          sh ./install.sh --yes --no-service
          "$RUNNER_TEMP/bin/promptdeck" --help
      - if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PROMPTDECK_PACKAGE = "."
          ./install.ps1 --yes
          & "$env:LOCALAPPDATA\PromptDeck\bin\promptdeck.cmd" --help
